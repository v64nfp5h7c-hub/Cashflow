function DonutChart({innerData,outerData,centerLabel,centerSub,size=240}){
const r1=78,r2=95,cx=size/2,cy=size/2;
function slices(data,r){
const total=data.reduce((s,d)=>s+d.value,0);
if(!total)return[{path:“M”+cx+”,”+(cy-r)+” A”+r+”,”+r+”,0,1,1,”+(cx-0.001)+”,”+(cy-r)+” Z”,color:”#1e293b”}];
let angle=-Math.PI/2;const paths=[];
data.forEach(d=>{
if(d.value<=0)return;
const sweep=(d.value/total)*2*Math.PI;
const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
const x2=cx+r*Math.cos(angle+sweep),y2=cy+r*Math.sin(angle+sweep);
const large=sweep>Math.PI?1:0;
paths.push({path:“M”+cx+”,”+cy+” L”+x1+”,”+y1+” A”+r+”,”+r+”,0,”+large+”,1,”+x2+”,”+y2+” Z”,color:d.color});
angle+=sweep;
});
return paths;
}
const inner=slices(innerData,r1),outer=slices(outerData,r2);
return React.createElement(“svg”,{width:size,height:size,style:{display:“block”,margin:“0 auto”}},
outer.map((s,i)=>React.createElement(“path”,{key:“o”+i,d:s.path,fill:s.color,opacity:0.35,stroke:”#05080f”,strokeWidth:1.5})),
inner.map((s,i)=>React.createElement(“path”,{key:“i”+i,d:s.path,fill:s.color,opacity:0.9,stroke:”#05080f”,strokeWidth:1.5})),
React.createElement(“circle”,{cx,cy,r:52,fill:”#05080f”}),
React.createElement(“text”,{x:cx,y:cy-10,textAnchor:“middle”,fill:”#f8fafc”,fontSize:22,fontWeight:800,fontFamily:“system-ui”},centerLabel),
React.createElement(“text”,{x:cx,y:cy+12,textAnchor:“middle”,fill:”#475569”,fontSize:11,fontFamily:“system-ui”},“remaining”),
centerSub&&React.createElement(“text”,{x:cx,y:cy+28,textAnchor:“middle”,fill:”#334155”,fontSize:10,fontFamily:“system-ui”},centerSub)
);
}
