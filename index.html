<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Cash Flow</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#000;color:#fff;font-family:system-ui,-apple-system,sans-serif;overflow-x:hidden;}
input,select,button,textarea{font-family:system-ui,-apple-system,sans-serif;}
input[type=range]{width:100%;accent-color:#d4a017;}
::-webkit-scrollbar{display:none;}
.app{max-width:500px;margin:0 auto;min-height:100vh;padding-bottom:100px;}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:#000;border-top:2px solid #d4a017;padding:10px 20px 28px;z-index:100;display:flex;justify-content:space-around;}
.nav button{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 8px;}
.nav .ni{font-size:20px;filter:grayscale(1) opacity(0.3);}
.nav .nl{font-size:9px;font-weight:700;color:#333;letter-spacing:1px;}
.nav button.active .ni{filter:none;}
.nav button.active .nl{color:#d4a017;}
.nav .dot{width:5px;height:5px;border-radius:50%;background:#d4a017;}
.section{padding:0 20px;}
.lbl{font-size:9px;letter-spacing:4px;color:#444;font-weight:700;text-transform:uppercase;margin-bottom:8px;display:block;}
.card{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:16px;padding:18px 20px;margin-bottom:12px;}
.inp{width:100%;background:#0a0a0a;border:2px solid #222;border-radius:14px;padding:16px 18px;color:#fff;font-size:16px;outline:none;box-sizing:border-box;margin-bottom:10px;}
.inp:focus{border-color:#d4a017;}
select.inp option{background:#0a0a0a;color:#fff;}
.btn-blue{width:100%;background:#d4a017;border:none;border-radius:14px;color:#000;padding:16px;cursor:pointer;font-size:15px;font-weight:900;letter-spacing:1px;}
.btn-green{width:100%;background:#000;border:2px solid #00ff88;border-radius:14px;color:#00ff88;padding:16px;cursor:pointer;font-size:15px;font-weight:900;letter-spacing:1px;}
.btn-purple{width:100%;background:#000;border:2px solid #d4a017;border-radius:14px;color:#d4a017;padding:16px;cursor:pointer;font-size:15px;font-weight:900;letter-spacing:1px;}
.ptrack{background:#111;border-radius:99px;height:4px;overflow:hidden;margin:4px 0;}
.pfill{height:100%;border-radius:99px;transition:width 0.4s;}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);color:#000;padding:12px 24px;border-radius:14px;font-size:14px;font-weight:900;z-index:999;white-space:nowrap;background:#d4a017;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:998;display:flex;align-items:center;justify-content:center;padding:0 24px;}
.modal{background:#0a0a0a;border:2px solid #d4a017;border-radius:20px;padding:28px 24px;width:100%;max-width:400px;}
.gothic{font-family:'UnifrakturMaguntia',cursive;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;
const fmt=(n)=>(+n||0).toLocaleString("en-US",{style:"currency",currency:"USD"});
const fmtS=(n)=>"$"+Math.abs(+n||0).toFixed(0);
const today=new Date();
const CC={Bills:"#ef4444",Subscriptions:"#8b5cf6",Health:"#06b6d4",Food:"#f97316",Coffee:"#d97706",Gas:"#d4a017","Debt Repaid":"#ec4899",Business:"#d4a017",Savings:"#22c55e",Loan:"#f43f5e",Other:"#555"};
const CI={Bills:"📱",Subscriptions:"🔄",Health:"💊",Food:"🍔",Coffee:"☕",Gas:"⛽","Debt Repaid":"🤝",Business:"💼",Savings:"💰",Loan:"⚠️",Other:"📦"};
const CATS=Object.keys(CI);
const FR={"one-time":"One-time","weekly":"Weekly","biweekly":"Bi-weekly","monthly":"Monthly"};
const WGOAL=1200,WMIN=1000,WPIP=700,DGOAL=240;
const WDAYS=["Thu","Fri","Sat","Sun","Mon"];
const QUICK=[{label:"Gas",cat:"Gas",icon:"⛽"},{label:"Food",cat:"Food",icon:"🍔"},{label:"Coffee",cat:"Coffee",icon:"☕"},{label:"Groceries",cat:"Food",icon:"🛒"},{label:"Transfer",cat:"Savings",icon:"💰"}];
const PRODS=[
  {id:"directv",label:"DirecTV",amount:51,cat:"TV"},
  {id:"stream",label:"DirecTV Stream",amount:60,cat:"TV"},
  {id:"choiceplus",label:"DirecTV Choice+",amount:80,cat:"TV"},
  {id:"addbox",label:"Additional Box",amount:10,cat:"TV"},
  {id:"int25",label:"Internet 25M",amount:40,cat:"Internet"},
  {id:"int100",label:"Internet 50-100M",amount:60,cat:"Internet"},
  {id:"int300",label:"Internet 300M",amount:125,cat:"Internet"},
  {id:"int500",label:"Internet 500M",amount:130,cat:"Internet"},
  {id:"int1000",label:"Internet 1000M+",amount:165,cat:"Internet"},
  {id:"upgrade",label:"Upgrade",amount:20,cat:"Wireless"},
  {id:"tablet",label:"Tablet",amount:15,cat:"Wireless"},
  {id:"wearable",label:"Wearables",amount:15,cat:"Wireless"},
];
const DEBTS=[
  {id:1,label:"Credence Resource",amount:371,source:"Credit card",color:"#00ff88",s:0.55},
  {id:2,label:"NCA",amount:987,source:"Credit card",color:"#00ff88",s:0.55},
  {id:3,label:"Credit Control LLC",amount:1120,source:"Credit card",color:"#a855f7",s:0.55},
  {id:4,label:"Natl Credit Systems",amount:2823,source:"Apartment eviction",color:"#ffcc00",s:0.55},
  {id:5,label:"Natl Credit Systems",amount:6027,source:"Apartment eviction",color:"#ffcc00",s:0.55},
  {id:6,label:"Hunter Warfield",amount:7898,source:"Honda repo",color:"#f97316",s:0.45},
  {id:7,label:"Cavalry Portfolio",amount:11525,source:"Truck repo",color:"#ff2222",s:0.45},
];
const NAVS=[{id:"Home",icon:"⌂",label:"Home"},{id:"Bills",icon:"📅",label:"Bills"},{id:"Sales",icon:"💰",label:"Sales"},{id:"Car",icon:"🚗",label:"Car"},{id:"Debt",icon:"💳",label:"Debt"}];
function daysUntil(dueDay){if(!dueDay||dueDay===0)return 999;const t=new Date();t.setDate(dueDay);if(t<new Date())t.setMonth(t.getMonth()+1);return Math.ceil((t-new Date())/86400000);}
function urgColor(d){return d===0?"#ff2222":d<=3?"#ffcc00":"#00ff88";}
function DonutChart({inner,outer,label,sub}){
  const S=220,r1=70,r2=86,cx=110,cy=110;
  function arcs(data,r){
    const tot=data.reduce((s,d)=>s+d.v,0);
    if(!tot)return[{d:"M"+cx+","+(cy-r)+" A"+r+","+r+",0,1,1,"+(cx-.001)+","+(cy-r)+" Z",c:"#222"}];
    let a=-Math.PI/2,ps=[];
    data.forEach(d=>{
      if(d.v<=0)return;
      const sw=(d.v/tot)*2*Math.PI,x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a),x2=cx+r*Math.cos(a+sw),y2=cy+r*Math.sin(a+sw),lg=sw>Math.PI?1:0;
      ps.push({d:"M"+cx+","+cy+" L"+x1+","+y1+" A"+r+","+r+",0,"+lg+",1,"+x2+","+y2+" Z",c:d.c});
      a+=sw;
    });
    return ps;
  }
  const inn=arcs(inner,r1),out=arcs(outer,r2);
  return(
    <svg width={S} height={S} style={{display:"block",margin:"0 auto"}}>
      {out.map((s,i)=><path key={"o"+i} d={s.d} fill={s.c} opacity={0.3} stroke="#000" strokeWidth={1.5}/>)}
      {inn.map((s,i)=><path key={"i"+i} d={s.d} fill={s.c} opacity={0.9} stroke="#000" strokeWidth={1.5}/>)}
      <circle cx={cx} cy={cy} r={48} fill="#000"/>
      <text x={cx} y={cy-6} textAnchor="middle" fill="#fff" fontSize={19} fontWeight={800} fontFamily="system-ui">{label}</text>
      <text x={cx} y={cy+12} textAnchor="middle" fill="#444" fontSize={10} fontFamily="system-ui">remaining</text>
      {sub&&<text x={cx} y={cy+26} textAnchor="middle" fill="#333" fontSize={9} fontFamily="system-ui">{sub}</text>}
    </svg>
  );
}
function App(){
  const [tab,setTab]=useState("Home");
  const [paycheck,setPaycheck]=useState(0);
  const [editPC,setEditPC]=useState(false);
  const [pcInput,setPcInput]=useState("");
  const [showNewPC,setShowNewPC]=useState(false);
  const [newPCInput,setNewPCInput]=useState("");
  const [newPCDate,setNewPCDate]=useState(new Date().toISOString().split("T")[0]);
  const [history,setHistory]=useState([]);
  const [bills,setBills]=useState([]);
  const [expenses,setExpenses]=useState([]);
  const [openG,setOpenG]=useState({});
  const [showAddForm,setShowAddForm]=useState(false);
  const [fLabel,setFLabel]=useState("");
  const [fAmt,setFAmt]=useState("");
  const [fFreq,setFFreq]=useState("one-time");
  const [fCat,setFCat]=useState("Food");
  const [fDue,setFDue]=useState("");
  const [editingBill,setEditingBill]=useState(null);
  const [editBillData,setEditBillData]=useState({});
  const [quickAmt,setQuickAmt]=useState("");
  const [activeQuick,setActiveQuick]=useState(null);
  const [sales,setSales]=useState({total:0,daily:{Thu:0,Fri:0,Sat:0,Sun:0,Mon:0},rejects:0,attempts:0,log:[]});
  const [selDay,setSelDay]=useState("Thu");
  const [mayBonus,setMayBonus]=useState(true);
  const [builder,setBuilder]=useState([]);
  const [addType,setAddType]=useState("line");
  const [plan,setPlan]=useState("premium");
  const [nextUp,setNextUp]=useState(false);
  const [otherProd,setOtherProd]=useState("directv");
  const [monthlySales,setMonthlySales]=useState(0);
  const [carSaved,setCarSaved]=useState(3200);
  const [carTarget,setCarTarget]=useState(7000);
  const [carWeekly,setCarWeekly]=useState(500);
  const [carWhatIf,setCarWhatIf]=useState(500);
  const [editCar,setEditCar]=useState(null);
  const [carIn,setCarIn]=useState("");
  const [settled,setSettled]=useState({});
  const [toast,setToast]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null);
  const [loaded,setLoaded]=useState(false);

  useEffect(()=>{
    try{
      const keys=["paycheck","history","bills","expenses","sales","monthlySales","carSaved","carTarget","carWeekly","settled","mayBonus"];
      const saved={};
      keys.forEach(k=>{const v=localStorage.getItem("cf_"+k);if(v)saved[k]=JSON.parse(v);});
      if(saved.paycheck!==undefined)setPaycheck(saved.paycheck);
      if(saved.history)setHistory(saved.history);
      if(saved.bills)setBills(saved.bills);
      if(saved.expenses)setExpenses(saved.expenses);
      if(saved.sales)setSales(saved.sales);
      if(saved.monthlySales!==undefined)setMonthlySales(saved.monthlySales);
      if(saved.carSaved!==undefined)setCarSaved(saved.carSaved);
      if(saved.carTarget!==undefined)setCarTarget(saved.carTarget);
      if(saved.carWeekly!==undefined)setCarWeekly(saved.carWeekly);
      if(saved.settled)setSettled(saved.settled);
      if(saved.mayBonus!==undefined)setMayBonus(saved.mayBonus);
    }catch(e){}
    setLoaded(true);
  },[]);

  useEffect(()=>{if(!loaded)return;try{localStorage.setItem("cf_paycheck",JSON.stringify(paycheck));}catch(e){};},[paycheck,loaded]);
  useEffect(()=>{if(!loaded)return;try{localStorage.setItem("cf_history",JSON.stringify(history));}catch(e){};},[history,loaded]);
  useEffect(()=>{if(!loaded)return;try{localStorage.setItem("cf_bills",JSON.stringify(bills));}catch(e){};},[bills,loaded]);
  useEffect(()=>{if(!loaded)return;try{localStorage.setItem("cf_expenses",JSON.stringify(expenses));}catch(e){};},[expenses,loaded]);
  useEffect(()=>{if(!loaded)return;try{localStorage.setItem("cf_sales",JSON.stringify(sales));}catch(e){};},[sales,loaded]);
  useEffect(()=>{if(!loaded)return;try{localStorage.setItem("cf_monthlySales",JSON.stringify(monthlySales));}catch(e){};},[monthlySales,loaded]);
  useEffect(()=>{if(!loaded)return;try{localStorage.setItem("cf_carSaved",JSON.stringify(carSaved));}catch(e){};},[carSaved,loaded]);
  useEffect(()=>{if(!loaded)return;try{localStorage.setItem("cf_carTarget",JSON.stringify(carTarget));}catch(e){};},[carTarget,loaded]);
  useEffect(()=>{if(!loaded)return;try{localStorage.setItem("cf_carWeekly",JSON.stringify(carWeekly));}catch(e){};},[carWeekly,loaded]);
  useEffect(()=>{if(!loaded)return;try{localStorage.setItem("cf_settled",JSON.stringify(settled));}catch(e){};},[settled,loaded]);
  useEffect(()=>{if(!loaded)return;try{localStorage.setItem("cf_mayBonus",JSON.stringify(mayBonus));}catch(e){};},[mayBonus,loaded]);

  const paidBills=bills.filter(b=>b.paid).reduce((s,b)=>s+b.amount,0);
  const expTotal=expenses.reduce((s,e)=>s+e.amount,0);
  const totalSpent=paidBills+expTotal;
  const remaining=paycheck-totalSpent;
  const pct=paycheck>0?Math.min((totalSpent/paycheck)*100,100):0;
  const sc=remaining<0?"#ff2222":remaining<paycheck*0.2?"#ffcc00":"#00ff88";
  const allItems=[...bills.filter(b=>b.paid),...expenses];
  const catSpent=CATS.reduce((acc,cat)=>{acc[cat]=allItems.filter(e=>e.category===cat).reduce((s,e)=>s+e.amount,0);return acc;},{});
  const catObl=CATS.reduce((acc,cat)=>{acc[cat]=bills.filter(b=>b.category===cat).reduce((s,b)=>s+b.amount,0);return acc;},{});
  const innerRing=CATS.filter(c=>catSpent[c]>0).map(c=>({v:catSpent[c],c:CC[c]}));
  const outerRing=CATS.filter(c=>catObl[c]>0).map(c=>({v:catObl[c],c:CC[c]}));
  const billGroups=Object.entries(bills.reduce((g,b)=>{const k=b.freq==="weekly"?"Weekly":b.dueDay?"Due "+b.dueDay+"th":"No Date";if(!g[k])g[k]=[];g[k].push(b);return g;},{})).sort(([a],[b])=>(parseInt(a.replace(/\D/g,""))||999)-(parseInt(b.replace(/\D/g,""))||999));
  const wkSales=sales.total;
  const wkPct=Math.min((wkSales/WGOAL)*100,100);
  const wkColor=wkSales>=WGOAL?"#00ff88":wkSales>=WMIN?"#ffcc00":"#ff2222";
  const dayTots=WDAYS.map(d=>({day:d,total:sales.daily[d]||0}));
  const lineAmt=50+(plan==="premium"?11:plan==="extra"?8:0)+(nextUp?10:0)+(mayBonus?35:0);
  const bldTotal=builder.reduce((s,i)=>s+i.amount,0);
  const rejRate=sales.attempts>0?Math.round((sales.rejects/sales.attempts)*100):0;
  const carGap=Math.max(carTarget-carSaved,0);
  const wksLeft=carWeekly>0?Math.ceil(carGap/carWeekly):null;
  const wiWks=carWhatIf>0?Math.ceil(carGap/carWhatIf):null;
  const carPct=Math.min((carSaved/carTarget)*100,100);
  const tgtDate=(()=>{if(!wksLeft)return null;const d=new Date();d.setDate(d.getDate()+wksLeft*7);return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});})();
  const totDebt=DEBTS.reduce((s,d)=>s+d.amount,0);
  const settledAmt=DEBTS.filter(d=>settled[d.id]).reduce((s,d)=>s+d.amount,0);
  const debtPct=(settledAmt/totDebt)*100;
  const settledCnt=DEBTS.filter(d=>settled[d.id]).length;
  const scoreBoost=settledCnt>=5?80:settledCnt>=3?50:settledCnt>=1?20:0;
  const estScore=489+scoreBoost;
  const nextDebt=DEBTS.filter(d=>!settled[d.id]).sort((a,b)=>a.amount-b.amount)[0];
  const netWorth=carSaved-settledAmt-totDebt;
  const prevNetWorth=history.length>0?(history[history.length-1].carSaved||0)-(history[history.length-1].settledAmt||0)-totDebt:null;
  const netWorthChange=prevNetWorth!==null?netWorth-prevNetWorth:null;
  const daysWorked=WDAYS.filter(d=>(sales.daily[d]||0)>0).length;
  const daysRemaining=Math.max(WDAYS.length-daysWorked,1);
  const needed=Math.max(WGOAL-wkSales,0);
  const paceNeeded=needed>0?Math.ceil(needed/daysRemaining):0;

  const showToast=(msg,color)=>{setToast({msg,color:color||"#00ff88"});setTimeout(()=>setToast(null),2500);};
  const confirmPC=()=>{const v=parseFloat(pcInput);if(!isNaN(v)&&v>=0)setPaycheck(v);setEditPC(false);};
  const newWeek=()=>{
    const amt=parseFloat(newPCInput);if(isNaN(amt)||amt<=0)return;
    const wn=history.length+1;
    setHistory(h=>[...h,{week:"Week "+wn,date:newPCDate,paycheck,spent:totalSpent,sales:wkSales,carSaved,settledAmt}]);
    setPaycheck(amt);setExpenses([]);
    setSales({total:0,daily:{Thu:0,Fri:0,Sat:0,Sun:0,Mon:0},rejects:0,attempts:0,log:[]});
    setBills(bs=>bs.map(b=>({...b,paid:false})));
    setMonthlySales(m=>m+wkSales);
    setNewPCInput("");setShowNewPC(false);showToast("New week started");
  };
  const addEntry=()=>{
    const amt=parseFloat(fAmt);if(!fLabel.trim()||isNaN(amt)||amt<=0)return;
    const due=parseInt(fDue);const id=Date.now();
    if(fFreq!=="one-time"){
      setBills(b=>[...b,{id,label:fLabel.trim(),amount:amt,category:fCat,dueDay:isNaN(due)?0:due,freq:fFreq,paid:false}]);
      if(fCat==="Savings")setCarSaved(v=>v+amt);
      showToast("Added to Bills","#00ff88");
    }else{
      setExpenses(e=>[...e,{id,label:fLabel.trim(),amount:amt,category:fCat,freq:fFreq}]);
      if(fCat==="Savings")setCarSaved(v=>v+amt);
      showToast("Logged","#d4a017");
    }
    setFLabel("");setFAmt("");setFFreq("one-time");setFCat("Food");setFDue("");setShowAddForm(false);
  };
  const addQuick=()=>{
    const q=QUICK.find(q=>q.label===activeQuick);
    const amt=parseFloat(quickAmt);
    if(!q||isNaN(amt)||amt<=0)return;
    const id=Date.now();
    setExpenses(e=>[...e,{id,label:q.label,amount:amt,category:q.cat,freq:"one-time"}]);
    if(q.cat==="Savings")setCarSaved(v=>v+amt);
    showToast(q.icon+" "+q.label+" logged","#d4a017");
    setQuickAmt("");setActiveQuick(null);
  };
  const toggleBill=(id)=>setBills(bs=>bs.map(b=>b.id===id?{...b,paid:!b.paid}:b));
  const deleteBill=(id)=>{setBills(bs=>bs.filter(b=>b.id!==id));setConfirmDel(null);showToast("Deleted","#ff2222");};
  const deleteExp=(id)=>{setExpenses(es=>es.filter(e=>e.id!==id));setConfirmDel(null);showToast("Deleted","#ff2222");};
  const saveBillEdit=()=>{
    if(!editBillData.label||!editBillData.amount)return;
    setBills(bs=>bs.map(b=>b.id===editingBill?{...b,...editBillData,amount:parseFloat(editBillData.amount)}:b));
    setEditingBill(null);showToast("Bill updated");
  };
  const toggleG=(k)=>setOpenG(p=>({...p,[k]:!p[k]}));
  const toggleDebt=(id)=>setSettled(p=>({...p,[id]:!p[id]}));
  const addLine=()=>{
    let amt=50;const pts=["New Line"];
    if(plan==="extra"){amt+=8;pts.push("Extra");}
    if(plan==="premium"){amt+=11;pts.push("Premium");}
    if(nextUp){amt+=10;pts.push("Next Up");}
    if(mayBonus){amt+=35;pts.push("+$35 Bonus");}
    setBuilder(b=>[...b,{type:"line",label:pts.join(" · "),amount:amt}]);
    setSales(s=>({...s,attempts:s.attempts+1}));
  };
  const addOther=()=>{const p=PRODS.find(p=>p.id===otherProd);if(!p)return;setBuilder(b=>[...b,{type:"other",label:p.label,amount:p.amount}]);};
  const rmBuilder=(i)=>setBuilder(b=>b.filter((_,idx)=>idx!==i));
  const logSale=()=>{
    if(!builder.length)return;
    const entry={id:Date.now(),items:[...builder],total:bldTotal,day:selDay};
    setSales(s=>({...s,total:s.total+bldTotal,daily:{...s.daily,[selDay]:(s.daily[selDay]||0)+bldTotal},log:[...s.log,entry]}));
    setBuilder([]);showToast("Sale logged · "+fmt(bldTotal));
  };
  const rmSale=(id)=>{
    const sale=sales.log.find(s=>s.id===id);if(!sale)return;
    setSales(s=>({...s,total:s.total-sale.total,daily:{...s.daily,[sale.day]:Math.max(0,(s.daily[sale.day]||0)-sale.total)},log:s.log.filter(x=>x.id!==id)}));
  };
  const saveCarEdit=(f)=>{const v=parseFloat(carIn);if(!isNaN(v)&&v>=0){if(f==="saved")setCarSaved(v);if(f==="target")setCarTarget(v);if(f==="weekly")setCarWeekly(v);}setEditCar(null);};

  if(!loaded)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16}}><div style={{fontSize:40}}>💵</div><div style={{fontSize:18,fontWeight:800,color:"#fff"}}>Cash Flow</div></div>;

  return(
    <div className="app">
      {toast&&<div className="toast" style={{background:toast.color}}>{toast.msg}</div>}
      {confirmDel&&(
        <div className="modal-bg" onClick={()=>setConfirmDel(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:18,fontWeight:800,color:"#fff",marginBottom:8}}>Delete this?</div>
            <div style={{fontSize:14,color:"#444",marginBottom:20}}>This cannot be undone.</div>

                <div style={{flex:1,fontSize:14,fontWeight:600,color:hit?"#00ff88":"#555"}}>{fmt(m)}</div>
                <div style={{fontSize:12,fontWeight:700,color:hit?"#00ff88":"#333"}}>{hit?"reached ✓":w?w+"w away":"—"}</div>
              </div>
            );
          })}
        </div>
      )}

      {tab==="Debt"&&(
        <div className="section" style={{paddingTop:24}}>
          <div className="gothic" style={{fontSize:30,color:"#fff",marginBottom:4}}>Collections</div>
          <div style={{fontSize:13,color:"#444",marginBottom:20}}>Smallest first · negotiate settlements</div>
          <div style={{background:"#000",border:"2px solid rgba(212,160,23,0.4)",borderRadius:18,padding:"16px 18px",marginBottom:14}}>
            <span className="gothic" style={{fontSize:17,color:"#d4a017",marginBottom:10,display:"block"}}>Credit Score Estimator</span>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div><div style={{fontSize:12,color:"#666"}}>Starting</div><div style={{fontSize:26,fontWeight:900,color:"#ff2222"}}>489</div></div>
              <div style={{fontSize:20,color:"#333"}}>→</div>
              <div style={{textAlign:"right"}}><div style={{fontSize:12,color:"#666"}}>Est. after settlements</div><div style={{fontSize:26,fontWeight:900,color:estScore>=600?"#00ff88":estScore>=550?"#ffcc00":"#ff2222"}}>{estScore}</div></div>
            </div>
            <div className="ptrack" style={{marginBottom:6}}><div className="pfill" style={{width:Math.min(((estScore-300)/550)*100,100)+"%",background:"linear-gradient(90deg,#ff2222,#ffcc00,#00ff88)"}}/></div>
            <div style={{fontSize:10,color:"#444",textAlign:"center"}}>+{scoreBoost} pts estimated · settle more to increase</div>
          </div>
          {nextDebt&&(
            <div style={{background:"#000",border:"2px solid #00ff88",borderRadius:16,padding:"14px 16px",marginBottom:14}}>
              <span className="gothic" style={{fontSize:17,color:"#00ff88",marginBottom:6,display:"block"}}>⚡ Next Move</span>
              <div style={{fontSize:14,fontWeight:700,color:"#fff",marginBottom:3}}>Settle {nextDebt.label}</div>
              <div style={{fontSize:12,color:"#444",marginBottom:6}}>{nextDebt.source} · {fmt(nextDebt.amount)}</div>
              <div style={{fontSize:12,color:"#00ff88",fontWeight:700}}>Offer ~{fmt(Math.round(nextDebt.amount*nextDebt.s))} ({Math.round(nextDebt.s*100)}¢ on $)</div>
            </div>
          )}
          <div style={{background:"#000",border:"2px solid #ff2222",borderRadius:20,padding:"18px 20px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><span className="lbl" style={{color:"#ff2222",marginBottom:4}}>REMAINING</span><div style={{fontSize:28,fontWeight:900,color:"#ff2222",letterSpacing:-1}}>{fmt(totDebt-settledAmt)}</div></div>
            <div style={{textAlign:"right"}}><span className="lbl" style={{marginBottom:4}}>CLEARED</span><div style={{fontSize:28,fontWeight:900,color:"#00ff88",letterSpacing:-1}}>{fmt(settledAmt)}</div></div>
          </div>
          <div className="ptrack" style={{marginBottom:20,height:6}}><div className="pfill" style={{width:debtPct+"%",background:"linear-gradient(90deg,#ff2222,#00ff88)"}}/></div>
          {DEBTS.map(d=>{
            const s=settled[d.id];
            return(
              <button key={d.id} onClick={()=>toggleDebt(d.id)} style={{width:"100%",background:s?"#000":"#0a0a0a",border:"1.5px solid "+(s?"#00ff88":d.color+"33"),borderRadius:18,padding:"16px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer",textAlign:"left",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:24,height:24,borderRadius:"50%",background:s?"#00ff88":"transparent",border:"2.5px solid "+(s?"#00ff88":d.color),display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{s&&<span style={{fontSize:11,color:"#000",fontWeight:800}}>✓</span>}</div>
                  <div>
                    <div style={{fontSize:14,fontWeight:700,color:s?"#00ff88":"#fff",textDecoration:s?"line-through":"none"}}>{d.label}</div>
                    <div style={{fontSize:11,color:"#444",marginTop:2}}>{d.source}</div>
                    <div style={{fontSize:10,color:"#333",marginTop:1}}>~{fmt(Math.round(d.amount*d.s))} ({Math.round(d.s*100)}¢/$)</div>
                  </div>
                </div>
                <div style={{fontSize:16,fontWeight:800,color:s?"#00ff88":"#ff2222",textDecoration:s?"line-through":"none"}}>{fmt(d.amount)}</div>
              </button>
            );
          })}
          <div className="card" style={{marginTop:8}}>
            <div className="gothic" style={{fontSize:18,color:"#d4a017",marginBottom:10}}>⚠️ Settlement Rules</div>
            {["Get written agreement BEFORE paying","Offer 40–55¢ on the dollar","Dispute errors at AnnualCreditReport.com","Top 3 cleared = +30–50 credit score pts"].map((r,i)=>(
              <div key={i} style={{display:"flex",gap:10,marginBottom:8}}><span style={{color:"#d4a017",fontWeight:700,flexShrink:0}}>·</span><span style={{fontSize:13,color:"#555"}}>{r}</span></div>
            ))}
          </div>
        </div>
      )}

      <nav className="nav">
        {NAVS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} className={tab===t.id?"active":""}>
            <span className="ni">{t.icon}</span>
            <span className="nl gothic" style={{fontSize:11}}>{t.label}</span>
            {tab===t.id&&<div className="dot"/>}
          </button>
        ))}
      </nav>
    </div>
  );
}
ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
